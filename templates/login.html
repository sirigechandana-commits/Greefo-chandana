<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Greefo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c5cfc;
            --secondary: #5c9bfc;
            --accent: #ffd700;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--primary), transparent);
            filter: blur(80px);
            z-index: -1;
            top: 20%;
            left: 20%;
            animation: move-blobs 15s infinite alternate ease-in-out;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--secondary), transparent);
            filter: blur(100px);
            z-index: -1;
            bottom: 20%;
            right: 20%;
            animation: move-blobs 20s infinite alternate-reverse ease-in-out;
        }

        @keyframes move-blobs {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -50px) scale(1.2); }
            100% { transform: translate(-100px, 80px) scale(0.8); }
        }

        /* Glass Card */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 10;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            color: white;
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 14px 18px;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(124, 92, 252, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(124, 92, 252, 0.5);
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            transition: 0.5s;
            pointer-events: none;
        }

        button:hover::after {
            left: 120%;
        }

        .footer-text {
            margin-top: 24px;
            font-size: 14px;
            color: #94a3b8;
        }

        .footer-text a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            color: var(--primary);
        }

        /* Error Message */
        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
                width: 92%;
                border-radius: 20px;
            }
            h2 { font-size: 28px; }
            p.subtitle { font-size: 13px; margin-bottom: 24px; }
            input { padding: 12px 14px; font-size: 14px; }
            button { padding: 12px; font-size: 15px; }
        }

    </style>
</head>
<body>

    <div class="login-card">

        <h2>Welcome Back</h2>
        <p class="subtitle">Experience the next level of mood tracking.</p>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" autocomplete="off">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required autocomplete="new-password">
            </div>
            <button type="submit">Login Now</button>
        </form>

        <div class="footer-text">
            No account? <a href="/signup">Create one for free</a>
        </div>
    </div>

</body>
</html>
