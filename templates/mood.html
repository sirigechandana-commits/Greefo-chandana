<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Greefo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --wave-color: rgba(99, 102, 241, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            color: white;
            text-align: center;
        }

        /* Animated Background Blobs */
        .blob-bg {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: -2; overflow: hidden;
        }
        .blob {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, var(--primary), transparent);
            filter: blur(100px); opacity: 0.4;
            animation: move 20s infinite alternate ease-in-out;
        }
        .blob-2 {
            bottom: -100px; right: -100px; background: radial-gradient(circle, var(--secondary), transparent);
            animation-duration: 25s; animation-direction: alternate-reverse;
        }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, 100px) scale(1.2); }
            100% { transform: translate(-50px, -50px) scale(0.8); }
        }

        /* Liquid Wave Animation (Don't remove water) */
        .waves {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 15vh;
            min-height: 100px; max-height: 150px; z-index: -1;
        }
        .parallax > use {
            animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
        }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; fill: rgba(99, 102, 241, 0.3); }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; fill: rgba(168, 85, 247, 0.3); }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; fill: rgba(99, 102, 241, 0.5); }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; fill: var(--bg-dark); }

        @keyframes move-forever {
            0% { transform: translate3d(-90px,0,0); }
            100% { transform: translate3d(85px,0,0); }
        }

        /* Content Styling */
        h1 {
            font-family: 'Outfit', sans-serif; font-size: 56px; font-weight: 800;
            margin-bottom: 15px; letter-spacing: -1px; animation: fadeInDown 1s ease-out;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h3 {
            font-size: 18px; font-weight: 400; color: #94a3b8; margin-bottom: 50px;
            letter-spacing: 1px; animation: fadeInDown 1.2s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mood-container {
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
            max-width: 900px; padding: 20px; animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mood-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); padding: 20px; border-radius: 28px;
            width: 170px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .mood-card:hover {
            transform: scale(1.08) translateY(-10px); background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .mood-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 18px; }

        .mood-btn {
            width: 100%; padding: 10px; border-radius: 12px; border: none;
            font-weight: 700; color: white; cursor: pointer; transition: 0.3s;
            font-size: 14px;
        }

        .happy-btn { background: #9333ea; }
        .chill-btn { background: #f59e0b; }
        .sad-btn   { background: #3b82f6; }
        .talk-btn  { background: #10b981; }

        .nav-container { margin-top: 40px; display: flex; gap: 15px; animation: fadeInUp 1.4s ease-out; }
        .nav-link {
            padding: 10px 24px; border-radius: 14px; background: rgba(255,255,255,0.05);
            color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 600;
            transition: 0.3s; border: 1px solid transparent;
        }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; border-color: var(--glass-border); }
        .admin-link { color: #facc15; border-color: rgba(250, 204, 21, 0.2); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            h1 { font-size: 40px; }
            h3 { font-size: 16px; margin-bottom: 30px; }
            .mood-container { gap: 15px; }
            .mood-card { width: 140px; border-radius: 20px; padding: 15px; }
            .mood-card img { height: 100px; }
        }

        @media (max-width: 480px) {
            body { padding: 40px 15px; overflow-y: auto; }
            h1 { font-size: 32px; }
            .mood-container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                width: 100%;
                max-width: 100%;
            }
            .mood-card {
                width: auto;
                padding: 12px;
                border-radius: 18px;
            }
            .mood-card img { height: 90px; }
            .nav-container { flex-direction: column; width: 100%; }
            .nav-link { text-align: center; width: 100%; }
            .waves { height: 10vh; }
        }
    </style>
</head>

<body>

    <div class="blob-bg">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <h1>Welcome to Greefo</h1>
    <h3>How are you feeling today?</h3>

    <div class="mood-container">
        <!-- Happy -->
        <a href="/happy" class="mood-card">
            <img src="{{ url_for('static', filename='img/happy.jpg') }}" alt="Happy">
            <button class="mood-btn happy-btn">😊 Happy</button>
        </a>

        <!-- Chill -->
        <a href="/chill" class="mood-card">
            <img src="{{ url_for('static', filename='img/chill.jpg') }}" alt="Chill">
            <button class="mood-btn chill-btn">😌 Chill</button>
        </a>

        <!-- Sad -->
        <a href="/sad" class="mood-card">
            <img src="{{ url_for('static', filename='img/sad.jpg') }}" alt="Sad">
            <button class="mood-btn sad-btn">😔 Sad</button>
        </a>

        <!-- Talk -->
        <a href="/talk" class="mood-card">
            <img src="{{ url_for('static', filename='img/talk.jpg') }}" alt="Talk">
            <button class="mood-btn talk-btn">🗣 Talk</button>
        </a>
    </div>

    <div class="nav-container">
        {% if session.get('user') == 'admin' %}
        <a href="/admin" class="nav-link admin-link">🛡️ Admin Dashboard</a>
        {% endif %}
        <a href="/logout" class="nav-link">🚪 Logout</a>
    </div>

    <!-- Liquid Waves -->
    <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs>
            <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
        </defs>
        <g class="parallax">
            <use xlink:href="#gentle-wave" x="48" y="0" />
            <use xlink:href="#gentle-wave" x="48" y="3" />
            <use xlink:href="#gentle-wave" x="48" y="5" />
            <use xlink:href="#gentle-wave" x="48" y="7" />
        </g>
    </svg>

</body>
</html>
