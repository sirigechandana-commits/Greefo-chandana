<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Greefo | Build Your Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c5cfc;
            --secondary: #5c9bfc;
            --accent: #ffd700;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Blobs */
        body::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, var(--secondary), transparent);
            filter: blur(90px);
            z-index: -1;
            top: 10%;
            right: 15%;
            animation: move-blobs 18s infinite alternate ease-in-out;
        }

        body::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, var(--primary), transparent);
            filter: blur(120px);
            z-index: -1;
            bottom: 10%;
            left: 15%;
            animation: move-blobs 22s infinite alternate-reverse ease-in-out;
        }

        @keyframes move-blobs {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-60px, 60px) scale(1.1); }
            100% { transform: translate(80px, -40px) scale(0.9); }
        }

        .signup-card {
            background: var(--glass);
            backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
            z-index: 10;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            color: white;
            font-size: 34px;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            display: block;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            padding: 14px 18px;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input:focus {
            border-color: var(--secondary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(92, 155, 252, 0.25);
            transform: translateY(-1px);
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(124, 92, 252, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -5px rgba(124, 92, 252, 0.6);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 28px;
            font-size: 14px;
            color: #94a3b8;
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: 0.2s;
        }

        .footer-text a:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        /* Error Message Snippet */
        .error-box {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 25px;
            font-size: 13px;
            animation: shake 0.6s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .signup-card {
                padding: 30px 20px;
                width: 92%;
                border-radius: 20px;
            }
            h2 { font-size: 30px; }
            p.subtitle { font-size: 14px; margin-bottom: 24px; }
            input { padding: 12px 14px; font-size: 14px; }
            button { padding: 14px; font-size: 15px; }
        }

    </style>
</head>
<body>

    <div class="signup-card">
        <h2>Join Greefo</h2>
        <p class="subtitle">Start your journey with the world's most intuitive mood tracking platform.</p>

        {% if error %}
        <div class="error-box">
            ❌ {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/signup" autocomplete="off">
            <div class="input-group">
                <label>Choose a Username</label>
                <input type="text" name="username" placeholder="e.g. lokesh_dev" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Create a Password</label>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="new-password">
            </div>
            <button type="submit">Create Free Account</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="/login">Log in here</a>
        </div>
    </div>

</body>
</html>
